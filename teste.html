<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora?</title>
    <style>
        body {
            display: flex;
            background-image: url(https://www.meioemensagem.com.br/wp-content/uploads/2024/02/Burger-King-Kid-Bengala-Credito_Reproducao.jpg);
            height: 100%;
            background-position: top;
            background-repeat: no-repeat;
            background-size: 98%;
            
            padding: 10px;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: sans-serif;
        }

        .btn {
            background: rgb(255, 234, 3);
            color: black;
            border: none;
            padding: 10px;
            width: 80px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="conteudo">
        <h2>C*zinho hoje?</h2>
        <div style="margin: auto;width: 170px;">
            <button style="position: fixed;display: block;" class="btn" onclick="sim()">SIM</button>
            <button class="btn" onclick="desvia(this)" onmouseover="desvia(this)" style="position: absolute;">NÃO</button>
        </div>
    </div>
</body>


<script>
    function sim() {
        alert("Vencemo!!! :)");
        // redireciona para um URL após clicar no SIM
        location.href = "https://music.youtube.com/watch?v=izGwDsrQ1eQ";
    }

    function desvia(btn) {
        // btn declarado na função
        btn.style.position = 'absolute';
        btn.style.bottom = geraPosicao(10, 90);
        btn.style.left = geraPosicao(10, 90);
        console.log('opa, desviei...');
    }

    function geraPosicao(min, max) {
        return (Math.random() * (max - min) + min) + "%";
    }

</script>

</html>
